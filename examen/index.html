<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPN 2026 | Simulador Pro IyCFM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --guinda: #6A1B31;
            --oro: #BC955C;
            --exito: #27ae60;
            --error: #e74c3c;
            --info: #3498db;
            --bg: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        #quiz-container { background: white; max-width: 900px; width: 100%; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); overflow: hidden; position: relative; }

        .header { background: var(--guinda); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--oro); }
        .timer { font-family: 'Roboto Mono', monospace; font-size: 1.5rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 8px; }

        .progress-bar { height: 8px; background: #eee; width: 100%; }
        #fill { height: 100%; background: var(--oro); width: 0%; transition: width 0.4s; }

        .content { padding: 40px; min-height: 500px; display: flex; flex-direction: column; }
        .question { font-size: 1.3rem; font-weight: 600; color: #2d3436; margin-bottom: 30px; line-height: 1.5; }

        .options { display: grid; gap: 12px; }
        .opt { 
            background: #fff; border: 2px solid #edf2f7; padding: 18px 25px; border-radius: 12px; 
            cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1.05rem; outline: none; font-family: inherit;
        }
        
        .opt.correct { border-color: var(--exito); background: #eafaf1; color: var(--exito); font-weight: 600; }
        .opt.wrong { border-color: var(--error); background: #fdf2f2; color: var(--error); }
        .opt.disabled { pointer-events: none; }

        /* Panel de Error */
        #study-area { 
            display: none; margin-top: 30px; padding: 25px; background: #f1f7fe; 
            border-radius: 12px; border-left: 6px solid var(--info); animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-google { 
            display: inline-flex; align-items: center; background: var(--info); color: white; 
            padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem;
        }
        .btn-continue { background: var(--guinda); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-left: 15px; }

        .results { display: none; padding: 60px; text-align: center; }
        .score-display { font-size: 5rem; font-weight: 800; color: var(--guinda); margin: 20px 0; }
        
        .footer { padding: 15px; background: #fafafa; border-top: 1px solid #eee; text-align: center; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="header">
        <div>
            <h1 style="font-size: 1.1rem; letter-spacing: 1px;">EXAMEN DE ADMISIÓN IPN 2026</h1>
            <p style="font-size: 0.75rem; opacity: 0.8;">Simulador Matemático IyCFM</p>
        </div>
        <div class="timer" id="clock">60:00</div>
    </div>
    <div class="progress-bar"><div id="fill"></div></div>

    <div id="quiz-view" class="content">
        <p class="question" id="q-text">Cargando reactivos de alto nivel...</p>
        <div class="options" id="opt-container"></div>
        
        <div id="study-area">
            <p id="hint-text" style="color: #34495e; margin-bottom: 15px;"></p>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <a id="google-link" target="_blank" class="btn-google">🔍 Estudiar tema en Google</a>
                <button class="btn-continue" onclick="nextQuestion()">Continuar Examen</button>
            </div>
        </div>
    </div>

    <div id="result-view" class="results">
        <h2>Evaluación Finalizada</h2>
        <div class="score-display" id="final-score">0/40</div>
        <p id="performance-msg" style="font-size: 1.1rem; margin-bottom: 30px;"></p>
        <button onclick="location.reload()" style="padding: 15px 40px; background: var(--oro); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Reiniciar Simulador</button>
    </div>

    <div class="footer" id="footer-info">Pregunta 1 de 40</div>
</div>

<script>
    // 40 Preguntas Nivel IPN IyCFM
    const bancoMatematicas = [
        // ÁLGEBRA Y COMPLEJOS
        { q: "¿Cuál es el valor simplificado de $i^{102}$?", o: ["1", "-1", "i", "-i"], c: 1, t: "potencias de la unidad imaginaria i", h: "Divide el exponente entre 4; el residuo es 2, y $i^2 = -1$." },
        { q: "Resuelve para x: $\\log_2(x) + \\log_2(x-2) = 3$", o: ["4", "-2", "4 y -2", "8"], c: 0, t: "ecuaciones logaritmicas propiedades", h: "Usa $\\log(a)+\\log(b) = \\log(ab)$. La solución negativa se descarta por dominio." },
        { q: "Factoriza completamente: $8x^3 - 27$", o: ["$(2x-3)^3$", "$(2x-3)(4x^2+6x+9)$", "$(2x+3)(4x^2-6x+9)$", "$(2x-3)(2x+3)$"], c: 1, t: "factorizacion diferencia de cubos formula", h: "Usa la fórmula $a^3 - b^3 = (a-b)(a^2 + ab + b^2)$." },
        { q: "Determina el valor de 'k' para que las raíces de $x^2 - 6x + k = 0$ sean iguales:", o: ["6", "3", "9", "36"], c: 2, t: "discriminante raices iguales ecuacion cuadratica", h: "Para raíces iguales, el discriminante $b^2 - 4ac$ debe ser igual a 0." },
        { q: "¿Cuál es el tercer término de $(2x + y)^4$?", o: ["$8x^3y$", "$24x^2y^2$", "$6x^2y^2$", "$16x^4$"], c: 1, t: "teorema del binomio de newton", h: "Usa la fórmula de combinaciones: $\\binom{4}{2}(2x)^2(y)^2$." },
        { q: "Si $f(x) = 2x - 1$, halla $f(f(3))$:", o: ["5", "9", "10", "11"], c: 1, t: "composicion de funciones", h: "Primero calcula $f(3) = 5$, luego calcula $f(5)$." },
        { q: "Simplifica: $\\frac{x^2 - 5x + 6}{x - 2}$", o: ["$x + 3$", "$x - 3$", "$x - 2$", "$x + 2$"], c: 1, t: "simplificacion de fracciones algebraicas", h: "Factoriza el numerador como $(x-2)(x-3)$ y cancela términos." },
        { q: "Valor de x en: $|3x - 4| = 5$", o: ["3", "-1/3", "3 y -1/3", "No tiene solución"], c: 2, t: "ecuaciones con valor absoluto", h: "Resuelve dos casos: $3x-4 = 5$ y $3x-4 = -5$." },
        { q: "Suma de las raíces de $2x^2 - 8x + 5 = 0$:", o: ["4", "-4", "5/2", "8"], c: 0, t: "relaciones de vieta suma y producto de raices", h: "Por Vieta, la suma es $-b/a$." },
        { q: "Resultado de $(1 + i)^2$:", o: ["2", "2i", "1 + 2i", "0"], c: 1, t: "cuadrado de un numero complejo", h: "Desarrolla el binomio: $1 + 2i + i^2$. Recuerda que $i^2 = -1$." },

        // GEOMETRÍA Y TRIGONOMETRÍA
        { q: "¿Cuál es el periodo de la función $f(x) = \\cos(2x)$?", o: ["$2\\pi$", "$\\pi$", "$\\pi/2$", "$4\\pi$"], c: 1, t: "periodo de funciones trigonometricas", h: "El periodo es $2\\pi/k$, donde k es el coeficiente de x." },
        { q: "Identidad: $\\sin^2(\\theta) / (1 - \\cos(\\theta))$ es igual a:", o: ["$\\cos(\\theta)$", "$1 + \\cos(\\theta)$", "$1 - \\cos(\\theta)$", "$\\sin(\\theta)$"], c: 1, t: "identidades trigonometricas pitagoricas simplificacion", h: "Sustituye $\\sin^2$ por $1-\\cos^2$, luego factoriza como diferencia de cuadrados." },
        { q: "En un triángulo rectángulo, si $\\tan(A) = 3/4$, ¿cuánto vale $\\sin(A)$?", o: ["3/5", "4/5", "5/3", "3/4"], c: 0, t: "funciones trigonometricas triangulo rectangulo", h: "Cateto opuesto=3, Cateto adyacente=4, Hipotenusa=5." },
        { q: "Ecuación de la recta que pasa por (1,2) y es paralela a $y = 3x - 5$:", o: ["$y = 3x + 1$", "$y = 3x - 1$", "$y = -1/3x + 2$", "$y = 3x + 2$"], c: 1, t: "ecuacion de la recta paralela punto pendiente", h: "Usa la misma pendiente ($m=3$) y la fórmula $y - y_1 = m(x - x_1)$." },
        { q: "Centro y radio de $x^2 + y^2 - 4x + 6y - 3 = 0$:", o: ["(2,-3), r=4", "(-2,3), r=4", "(2,-3), r=16", "(4,-6), r=4"], c: 0, t: "ecuacion general de la circunferencia completar cuadrados", h: "Completa cuadrados para llevar a la forma $(x-h)^2 + (y-k)^2 = r^2$." },
        { q: "Distancia entre los puntos (2,3) y (5,7):", o: ["7", "5", "25", "√7"], c: 1, t: "distancia entre dos puntos formula", h: "Usa $\\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}$." },
        { q: "Vértice de la parábola $y = x^2 - 4x + 5$:", o: ["(2,1)", "(-2,1)", "(2,5)", "(4,5)"], c: 0, t: "vertice de una parabola formula", h: "El valor de x es $-b/2a$." },
        { q: "¿Qué tipo de cónica es $4x^2 + 9y^2 = 36$?", o: ["Circunferencia", "Parábola", "Elipse", "Hipérbola"], c: 2, t: "identificacion de conicas ecuacion canonica", h: "Coeficientes de $x^2$ y $y^2$ diferentes pero con el mismo signo." },
        { q: "Valor de $\\sec(60^\\circ)$:", o: ["1/2", "2", "$\\sqrt{3}/2$", "$2/\\sqrt{3}$"], c: 1, t: "valores de funciones trigonometricas notables", h: "$\\sec = 1/\\cos$. $\\cos(60^\\circ) = 1/2$." },
        { q: "Convertir $3\\pi/4$ radianes a grados:", o: ["120°", "135°", "150°", "225°"], c: 1, t: "conversion de radianes a grados", h: "Multiplica por $180/\\pi$." },

        // CÁLCULO DIFERENCIAL E INTEGRAL
        { q: "Límite de $(x^2 - 1) / (x - 1)$ cuando $x \\to 1$:", o: ["0", "1", "2", "No existe"], c: 2, t: "limites indeterminados 0/0 factorizacion", h: "Factoriza $(x-1)(x+1)$ y simplifica antes de evaluar." },
        { q: "Derivada de $f(x) = \\ln(x^2 + 1)$:", o: ["$1 / (x^2 + 1)$", "$2x / (x^2 + 1)$", "$2 / (x^2 + 1)$", "$2x$"], c: 1, t: "derivada de logaritmo natural regla de la cadena", h: "La derivada de $\\ln(u)$ es $u'/u$." },
        { q: "Pendiente de la tangente a $y = x^2$ en el punto (3,9):", o: ["3", "9", "6", "2"], c: 2, t: "derivada como pendiente de la recta tangente", h: "Calcula la derivada $y' = 2x$ y evalúa en $x = 3$." },
        { q: "Derivada de $f(x) = \\sin(3x)$:", o: ["$\\cos(3x)$", "$3\\cos(3x)$", "$-3\\cos(3x)$", "$\\cos(3)$"], c: 1, t: "derivada de funciones trigonometricas regla de la cadena", h: "Multiplica la derivada del seno por la derivada del argumento." },
        { q: "Integral de $\\int (3x^2 - 4x + 1) dx$:", o: ["$x^3 - 2x^2 + x + C$", "$3x^3 - 4x^2 + x + C$", "$x^3 - 4x^2 + C$", "$6x - 4$"], c: 0, t: "integral indefinida de potencias", h: "Usa $\\int x^n = x^{n+1}/(n+1)$ para cada término." },
        { q: "Valor de $\\int_1^2 2x dx$:", o: ["2", "3", "4", "5"], c: 1, t: "integral definida teorema fundamental del calculo", h: "La integral es $x^2$. Evalúa $2^2 - 1^2$." },
        { q: "La segunda derivada de $f(x) = x^3$ es:", o: ["$3x^2$", "$6x$", "$6$", "$0$"], c: 1, t: "derivadas de orden superior", h: "Deriva una vez ($3x^2$) y luego deriva ese resultado." },
        { q: "¿En qué punto la función $f(x) = x^2 - 4x$ tiene un mínimo?", o: ["(2, -4)", "(2, 0)", "(0, 0)", "(4, 0)"], c: 0, t: "puntos criticos maximos y minimos", h: "Iguala la primera derivada a cero para hallar x, luego sustituye en f(x)." },
        { q: "Límite cuando $x \\to \\infty$ de $(5x^2 + 1) / (2x^2 - 3)$:", o: ["0", "$\\infty$", "5/2", "1/3"], c: 2, t: "limites al infinito de funciones racionales", h: "Cuando los grados son iguales, el límite es el cociente de los coeficientes principales." },
        { q: "Derivada de $f(x) = e^{x^2}$:", o: ["$e^{x^2}$", "$2x e^{x^2}$", "$x^2 e^{x^2-1}$", "$2e^x$"], c: 1, t: "derivada de funcion exponencial compuesta", h: "La derivada de $e^u$ es $e^u \\cdot u'$." },

        // PROBABILIDAD Y ESTADÍSTICA
        { q: "¿Cuántos números de 3 cifras se pueden formar con {1,2,3,4,5} sin repetir?", o: ["125", "60", "20", "15"], c: 1, t: "permutaciones sin repeticion", h: "Es una permutación $P(5,3) = 5 \\times 4 \\times 3$." },
        { q: "Media aritmética de 5, 8, 10, 12, 15:", o: ["10", "11", "12", "50"], c: 0, t: "promedio o media aritmetica", h: "Suma los valores y divide entre el número total de elementos (5)." },
        { q: "Probabilidad de obtener un número par al lanzar un dado legal:", o: ["1/6", "1/3", "1/2", "2/3"], c: 2, t: "probabilidad basica casos favorables", h: "Los pares son {2, 4, 6}. Son 3 casos de 6 totales." },
        { q: "¿De cuántas formas se puede elegir un comité de 2 personas de un grupo de 4?", o: ["12", "6", "8", "4"], c: 1, t: "combinaciones sin repeticion", h: "Usa la fórmula de combinaciones $\\binom{4}{2}$ (el orden no importa)." },
        { q: "Si P(A) = 0.3 y P(B) = 0.4, y son independientes, ¿P(A ∩ B)?", o: ["0.7", "0.1", "0.12", "0.34"], c: 2, t: "probabilidad de eventos independientes", h: "Si son independientes, se multiplican: $0.3 \\times 0.4$." },
        { q: "La moda del conjunto {2, 3, 3, 4, 4, 4, 5} es:", o: ["3", "4", "5", "3.5"], c: 1, t: "medidas de tendencia central moda", h: "La moda es el valor que más se repite." },
        { q: "¿Cuál es el valor de $0!$?", o: ["0", "1", "$\\infty$", "No existe"], c: 1, t: "factorial de cero definicion", h: "Por definición matemática, $0! = 1$." },
        { q: "Si lanzas dos monedas, ¿probabilidad de obtener dos águilas?", o: ["1/2", "1/4", "3/4", "1/8"], c: 1, t: "espacio muestral probabilidad monedas", h: "El espacio es {AA, AS, SA, SS}. Solo uno es favorable." },
        { q: "Rango de los datos {10, 2, 35, 15, 20}:", o: ["35", "33", "10", "2"], c: 1, t: "rango estadistico dispersion", h: "Rango = Valor máximo - Valor mínimo ($35 - 2$)." },
        { q: "¿A qué área pertenece la carrera de Ingeniería Mecánica en el IPN?", o: ["Ciencias Sociales", "Ciencias Médico Biológicas", "IyCFM", "Humanidades"], c: 2, t: "oferta educativa IPN areas", h: "El IPN divide sus carreras en tres áreas; las ingenierías pertenecen a IyCFM." }
    ];

    let current = 0;
    let score = 0;
    let timeLeft = 60 * 60;
    let timerInterval;

    const qText = document.getElementById('q-text');
    const optContainer = document.getElementById('opt-container');
    const progFill = document.getElementById('fill');
    const footerInfo = document.getElementById('footer-info');
    const studyArea = document.getElementById('study-area');

    function startTimer() {
        const clock = document.getElementById('clock');
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            clock.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(timeLeft <= 300) clock.style.color = "#e74c3c";
            if(timeLeft <= 0) { clearInterval(timerInterval); showResults(); }
        }, 1000);
    }

    function loadQuestion() {
        studyArea.style.display = 'none';
        const data = bancoMatematicas[current];
        
        // Limpieza básica de etiquetas LaTeX para visualización en HTML
        qText.innerText = data.q.replace(/\$/g, "");
        footerInfo.innerText = `Reactivo ${current + 1} de ${bancoMatematicas.length}`;
        progFill.style.width = `${(current / bancoMatematicas.length) * 100}%`;
        
        optContainer.innerHTML = '';
        data.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.innerText = opt.replace(/\$/g, "");
            btn.onclick = () => checkAnswer(idx, btn);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, element) {
        const data = bancoMatematicas[current];
        const allBtns = document.querySelectorAll('.opt');
        allBtns.forEach(b => b.classList.add('disabled'));

        if(selected === data.c) {
            score++;
            element.classList.add('correct');
            // Auto-pase si es correcto
            setTimeout(nextQuestion, 1000);
        } else {
            element.classList.add('wrong');
            allBtns[data.c].classList.add('correct');
            showErrorPanel(data);
        }
    }

    function showErrorPanel(data) {
        studyArea.style.display = 'block';
        document.getElementById('hint-text').innerHTML = `<strong>Pista de estudio:</strong> ${data.h}`;
        const query = encodeURIComponent(`ejercicios resueltos de ${data.t} examen admision`);
        document.getElementById('google-link').href = `https://www.google.com/search?q=${query}`;
    }

    function nextQuestion() {
        current++;
        if(current < bancoMatematicas.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        clearInterval(timerInterval);
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/40`;
        
        const pct = (score / 40) * 100;
        let msg = "";
        if(pct >= 90) msg = "¡Nivel Excelencia! Tienes grandes posibilidades de quedar en tu primera opción.";
        else if(pct >= 70) msg = "Buen desempeño. Te recomendamos reforzar los temas que investigaste durante el examen.";
        else msg = "Sigue practicando. El área de IyCFM requiere un dominio sólido de cálculo y álgebra.";
        
        document.getElementById('performance-msg').innerText = msg;
    }

    // Iniciar
    startTimer();
    loadQuestion();
</script>
</body>
</html>
